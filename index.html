<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker Login</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 bg-black rounded-full flex items-center justify-center">
                <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.22-2.73.585-3.315-.66-3.525-1.26-.12-.285-.645-1.26-1.11-1.51-.375-.21-.9-.69-.015-.705.825-.015 1.41.765 1.605 1.08.945 1.575 2.445 1.125 3.045.855.09-.66.36-1.125.645-1.38-2.235-.255-4.575-1.125-4.575-4.965 0-1.095.39-1.995 1.035-2.7-.105-.255-.45-1.275.105-2.655 0 0 .84-.27 2.76 1.02.795-.225 1.65-.33 2.505-.33.855 0 1.71.105 2.505.33 1.92-1.29 2.76-1.02 2.76-1.02.555 1.38.21 2.4.105 2.655.645.705 1.035 1.605 1.035 2.7 0 3.84-2.355 4.695-4.59 4.95.36.315.69.93.69 1.875 0 1.35-.015 2.43-.015 2.775 0 .315.225.675.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-center text-gray-800">GitHub Issue Tracker</h2>
        <p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>

        <form class="space-y-4">
            <div>
                <input type="text" placeholder="Username" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
            </div>
            <div>
                <input type="password" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
            </div>
            
            <p class="text-sm text-gray-400">Default Admin</p>

            <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
                Sign In
            </button>
        </form>

        <div class="my-6 flex items-center justify-center">
            <span class="text-gray-400 text-sm">OR</span>
        </div>

        <button class="w-full border border-gray-300 py-3 rounded-lg text-gray-700 font-semibold hover:bg-gray-50 transition">
            Demo
        </button>

    </div>

</body>
</html>
